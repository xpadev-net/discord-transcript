services:
  app:
    build: .
    # Host networking is required for Discord voice (songbird).
    # Docker's bridge network does not reliably NAT the UDP traffic
    # needed for voice gateway IP discovery and audio streaming.
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://discord_transcript:${POSTGRES_PASSWORD}@127.0.0.1/discord_transcript
      CLAUDE_COMMAND: claude
      CHUNK_STORAGE_DIR: /data/chunks
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ja}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      WEB_PORT: ${WEB_PORT:-3000}
      WEB_BIND_HOST: ${WEB_BIND_HOST:-0.0.0.0}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
    volumes:
      - ${HOME}/.claude:/home/app/.claude
      - chunks:/data/chunks
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: discord_transcript
      POSTGRES_USER: discord_transcript
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_transcript"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      sh -c 'set -e; for f in /migrations/*.sql; do psql -h db -U discord_transcript -d discord_transcript -f "$$f"; done'

volumes:
  pgdata:
  chunks:
