services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://discord_transcript:${POSTGRES_PASSWORD}@db/discord_transcript
      CLAUDE_COMMAND: claude
      CHUNK_STORAGE_DIR: /data/chunks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.claude:/home/app/.claude
      - chunks:/data/chunks
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: discord_transcript
      POSTGRES_USER: discord_transcript
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_transcript"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      sh -c 'set -e; for f in /migrations/*.sql; do psql -h db -U discord_transcript -d discord_transcript -f "$$f"; done'

volumes:
  pgdata:
  chunks:
