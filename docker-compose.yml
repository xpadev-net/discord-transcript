services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://discord_transcript:discord_transcript@db/discord_transcript
      CLAUDE_COMMAND: claude
      CHUNK_STORAGE_DIR: /data/chunks
    volumes:
      - ${HOME}/.claude:/root/.claude
      - chunks:/data/chunks
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: discord_transcript
      POSTGRES_USER: discord_transcript
      POSTGRES_PASSWORD: discord_transcript
    volumes:
      - ./migrations/0001_mvp_schema.sql:/docker-entrypoint-initdb.d/0001_mvp_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_transcript"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  chunks:
