<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-panel: #1e2a45;
  --bg-segment: #243352;
  --bg-segment-hover: #2a3d5f;
  --bg-segment-active: #2f4770;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a8b8;
  --text-muted: #6b7280;
  --accent: #4f8ef7;
  --accent-glow: rgba(79, 142, 247, 0.15);
  --border: #2d3a54;
  --border-light: #3a4a66;
  --header-bg: #0f1629;
  --scrollbar-track: #1a1a2e;
  --scrollbar-thumb: #3a4a66;
  --speaker-1: #4f8ef7;
  --speaker-2: #e06c75;
  --speaker-3: #98c379;
  --speaker-4: #e5c07b;
  --speaker-5: #c678dd;
  --speaker-6: #56b6c2;
  --speaker-7: #d19a66;
  --speaker-8: #ff79c6;
  --speaker-9: #8be9fd;
  --speaker-10: #bd93f9;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 15px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--scrollbar-track);
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 3px;
}

/* Header */
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-content {
  max-width: 1600px;
  margin: 0 auto;
}

.header h1 {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.header-meta {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.header-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-meta-item .label {
  color: var(--text-muted);
}

/* Main layout */
.main-container {
  display: flex;
  max-width: 1600px;
  margin: 0 auto;
  height: calc(100vh - 80px);
}

.left-panel {
  flex: 0 0 65%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.right-panel {
  flex: 0 0 35%;
  overflow-y: auto;
  padding: 20px 24px;
}

/* Audio player */
.audio-container {
  background: var(--bg-secondary);
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.audio-container audio {
  width: 100%;
  height: 40px;
  border-radius: 8px;
}

audio::-webkit-media-controls-panel {
  background: var(--bg-panel);
}

/* Transcript */
.transcript-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  scroll-behavior: smooth;
}

.segment {
  display: flex;
  gap: 12px;
  padding: 10px 12px;
  margin-bottom: 4px;
  border-radius: 6px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.segment:hover {
  background: var(--bg-segment-hover);
}

.segment.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.segment.noisy {
  opacity: 0.5;
}

.segment.noisy .segment-text::after {
  content: "[noisy]";
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 8px;
  font-style: italic;
}

.segment-meta {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  min-width: 100px;
}

.speaker-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
}

.segment-time {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.segment-text {
  flex: 1;
  font-size: 0.95rem;
  line-height: 1.6;
  padding-top: 1px;
}

/* Empty states */
.empty-state {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 200px;
  color: var(--text-muted);
  font-size: 0.95rem;
  text-align: center;
}

/* Summary panel */
.summary-header {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.summary-content h2 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  margin-top: 20px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.summary-content h2:first-child {
  margin-top: 0;
}

.summary-content h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 16px;
  margin-bottom: 8px;
}

.summary-content p {
  margin-bottom: 10px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.summary-content ul {
  list-style: none;
  margin-bottom: 12px;
  padding-left: 0;
}

.summary-content ul li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 6px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.summary-content ul li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 10px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.summary-content strong {
  color: var(--text-primary);
  font-weight: 600;
}

.summary-content em {
  font-style: italic;
  color: var(--text-secondary);
}

/* Loading */
.loading {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 200px;
  color: var(--text-muted);
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Status badge */
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.status-posted {
  background: rgba(79, 142, 247, 0.15);
  color: var(--accent);
}

.status-recording {
  background: rgba(224, 108, 117, 0.15);
  color: #e06c75;
}

/* Responsive */
@media (max-width: 768px) {
  .main-container {
    flex-direction: column;
    height: auto;
  }
  .left-panel {
    flex: none;
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 70vh;
  }
  .right-panel {
    flex: none;
    max-height: none;
    padding: 16px;
  }
  .segment-meta {
    min-width: 80px;
  }
  .header-meta {
    flex-wrap: wrap;
    gap: 8px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1 id="meeting-title">--</h1>
    <div class="header-meta">
      <div class="header-meta-item">
        <span class="label">日付:</span>
        <span id="meeting-date">--</span>
      </div>
      <div class="header-meta-item">
        <span class="label">時間:</span>
        <span id="meeting-duration">--</span>
      </div>
      <div class="header-meta-item">
        <span id="meeting-status-badge" class="status-badge">--</span>
      </div>
    </div>
  </div>
</div>

<div class="main-container">
  <div class="left-panel">
    <div class="audio-container">
      <audio id="audio-player" controls preload="metadata">
        <source id="audio-source" src="" type="audio/wav">
      </audio>
    </div>
    <div class="transcript-container" id="transcript-container">
      <div class="loading" id="transcript-loading">
        <div class="loading-spinner"></div>
        <span>読み込み中...</span>
      </div>
    </div>
  </div>
  <div class="right-panel">
    <div class="summary-header">サマリー</div>
    <div id="summary-content">
      <div class="loading" id="summary-loading">
        <div class="loading-spinner"></div>
        <span>読み込み中...</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var MEETING_ID = "{{MEETING_ID}}";
  var BASE = "/api/meetings/" + MEETING_ID;

  var speakerColors = [
    "var(--speaker-1)", "var(--speaker-2)", "var(--speaker-3)",
    "var(--speaker-4)", "var(--speaker-5)", "var(--speaker-6)",
    "var(--speaker-7)", "var(--speaker-8)", "var(--speaker-9)",
    "var(--speaker-10)"
  ];

  var speakerColorMap = {};
  var speakerIndex = 0;

  function getSpeakerColor(speakerId) {
    if (!speakerColorMap[speakerId]) {
      var hash = 0;
      for (var i = 0; i < speakerId.length; i++) {
        hash = ((hash << 5) - hash) + speakerId.charCodeAt(i);
        hash = hash & hash;
      }
      speakerColorMap[speakerId] = speakerColors[Math.abs(hash) % speakerColors.length];
      speakerIndex++;
    }
    return speakerColorMap[speakerId];
  }

  function formatDuration(seconds) {
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    var s = Math.floor(seconds % 60);
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function formatTimestamp(ms) {
    var totalSeconds = Math.floor(ms / 1000);
    var m = Math.floor(totalSeconds / 60);
    var s = totalSeconds % 60;
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function formatDate(isoString) {
    var d = new Date(isoString);
    var y = d.getFullYear();
    var m = d.getMonth() + 1;
    var day = d.getDate();
    var h = String(d.getHours()).padStart(2, "0");
    var min = String(d.getMinutes()).padStart(2, "0");
    return y + "/" + m + "/" + day + " " + h + ":" + min;
  }

  function renderMarkdown(text) {
    if (!text) return "";
    var lines = text.split("\n");
    var html = "";
    var inList = false;
    var inParagraph = false;
    var paragraphBuffer = "";

    function flushParagraph() {
      if (paragraphBuffer.trim()) {
        html += "<p>" + inlineFormat(paragraphBuffer.trim()) + "</p>";
      }
      paragraphBuffer = "";
      inParagraph = false;
    }

    function closeList() {
      if (inList) {
        html += "</ul>";
        inList = false;
      }
    }

    function inlineFormat(str) {
      str = str.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      str = str.replace(/\*(.+?)\*/g, "<em>$1</em>");
      return str;
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];

      if (/^###\s+(.+)$/.test(line)) {
        closeList();
        flushParagraph();
        html += "<h3>" + inlineFormat(RegExp.$1) + "</h3>";
      } else if (/^##\s+(.+)$/.test(line)) {
        closeList();
        flushParagraph();
        html += "<h2>" + inlineFormat(RegExp.$1) + "</h2>";
      } else if (/^[-]\s+(.+)$/.test(line)) {
        flushParagraph();
        if (!inList) {
          html += "<ul>";
          inList = true;
        }
        html += "<li>" + inlineFormat(RegExp.$1) + "</li>";
      } else if (line.trim() === "") {
        closeList();
        flushParagraph();
      } else {
        closeList();
        if (paragraphBuffer) {
          paragraphBuffer += " " + line;
        } else {
          paragraphBuffer = line;
          inParagraph = true;
        }
      }
    }

    closeList();
    flushParagraph();
    return html;
  }

  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // State
  var segments = [];
  var activeSegmentIndex = -1;
  var userScrolled = false;
  var scrollTimeout = null;

  // Fetch meeting info
  fetch(BASE)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById("meeting-title").textContent = data.title || "Untitled meeting";
      document.title = data.title || "Meeting";
      document.getElementById("meeting-date").textContent = data.started_at ? formatDate(data.started_at) : "--";
      document.getElementById("meeting-duration").textContent = data.duration_seconds ? formatDuration(data.duration_seconds) : "--";

      var statusBadge = document.getElementById("meeting-status-badge");
      var statusText = data.status || "unknown";
      var statusLabels = {
        "posted": "完了",
        "recording": "録音中",
        "processing": "処理中"
      };
      statusBadge.textContent = statusLabels[statusText] || statusText;
      statusBadge.className = "status-badge status-" + statusText;
    })
    .catch(function() {
      document.getElementById("meeting-title").textContent = "会議情報の取得に失敗しました";
    });

  // Set audio source
  var audioPlayer = document.getElementById("audio-player");
  document.getElementById("audio-source").src = BASE + "/audio";
  audioPlayer.load();

  // Fetch transcript
  fetch(BASE + "/transcript")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var container = document.getElementById("transcript-container");
      container.innerHTML = "";

      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state">この会議の文字起こしはまだ利用できません</div>';
        return;
      }

      segments = data;

      for (var i = 0; i < data.length; i++) {
        var seg = data[i];
        var el = document.createElement("div");
        el.className = "segment" + (seg.is_noisy ? " noisy" : "");
        el.setAttribute("data-index", i);
        el.setAttribute("data-start", seg.start_ms);
        el.setAttribute("data-end", seg.end_ms);

        var color = getSpeakerColor(seg.speaker_id);

        el.innerHTML =
          '<div class="segment-meta">' +
            '<span class="speaker-badge" style="background:' + color + '">Speaker ' + seg.speaker_id.slice(-4) + '</span>' +
            '<span class="segment-time">' + formatTimestamp(seg.start_ms) + '</span>' +
          '</div>' +
          '<div class="segment-text">' + escapeHtml(seg.text) + '</div>';

        el.addEventListener("click", (function(startMs) {
          return function() {
            audioPlayer.currentTime = startMs / 1000;
            audioPlayer.play();
          };
        })(seg.start_ms));

        container.appendChild(el);
      }

      // Track user scroll
      container.addEventListener("scroll", function() {
        userScrolled = true;
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(function() {
          userScrolled = false;
        }, 3000);
      });
    })
    .catch(function() {
      var container = document.getElementById("transcript-container");
      container.innerHTML = '<div class="empty-state">文字起こしの取得に失敗しました</div>';
    });

  // Fetch summary
  fetch(BASE + "/summary")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById("summary-content");
      if (!data || !data.markdown) {
        el.innerHTML = '<div class="empty-state">サマリーはまだ利用できません</div>';
        return;
      }
      el.innerHTML = '<div class="summary-content">' + renderMarkdown(data.markdown) + '</div>';
    })
    .catch(function() {
      var el = document.getElementById("summary-content");
      el.innerHTML = '<div class="empty-state">サマリーの取得に失敗しました</div>';
    });

  // Audio time sync
  audioPlayer.addEventListener("timeupdate", function() {
    if (segments.length === 0) return;

    var currentMs = audioPlayer.currentTime * 1000;
    var newIndex = -1;

    for (var i = 0; i < segments.length; i++) {
      if (currentMs >= segments[i].start_ms && currentMs < segments[i].end_ms) {
        newIndex = i;
        break;
      }
    }

    if (newIndex === activeSegmentIndex) return;

    var container = document.getElementById("transcript-container");
    var segmentEls = container.querySelectorAll(".segment");

    if (activeSegmentIndex >= 0 && activeSegmentIndex < segmentEls.length) {
      segmentEls[activeSegmentIndex].classList.remove("active");
    }

    activeSegmentIndex = newIndex;

    if (newIndex >= 0 && newIndex < segmentEls.length) {
      segmentEls[newIndex].classList.add("active");

      if (!userScrolled) {
        var segEl = segmentEls[newIndex];
        var containerRect = container.getBoundingClientRect();
        var segRect = segEl.getBoundingClientRect();
        var offset = segRect.top - containerRect.top - containerRect.height / 3;
        container.scrollBy({ top: offset, behavior: "smooth" });
      }
    }
  });
})();
</script>

</body>
</html>
